name: Deploy Staging
description: Deploys the backend to the staging environment with health check. Traefik auto-routes.

inputs:
  ssh-host:
    description: Server hostname or IP
    required: true
  ssh-user:
    description: SSH user
    required: true
  ssh-private-key:
    description: SSH private key
    required: true
  image-name:
    description: Full image name including registry
    required: true
  image-tag:
    description: Image tag to deploy
    required: false
    default: latest
  registry-username:
    description: GHCR username
    required: true
  registry-password:
    description: GHCR password
    required: true
  db-root-password:
    description: MariaDB root password (for creating staging DB)
    required: true
  db-user:
    description: MariaDB application user
    required: true
  db-password:
    description: MariaDB application user password
    required: true
  redis-password:
    description: Redis password
    required: true
  jwt-secret:
    description: JWT signing secret
    required: true
  swagger-username:
    description: Swagger UI username
    required: true
  swagger-password:
    description: Swagger UI password
    required: true
  staging-domain:
    description: Staging domain (e.g. staging.pumpedfitness.de)
    required: true

runs:
  using: composite
  steps:
    - name: Copy compose file to server
      shell: bash
      run: |
        echo "${{ inputs.ssh-private-key }}" > /tmp/ssh_key
        chmod 600 /tmp/ssh_key

        ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no \
          ${{ inputs.ssh-user }}@${{ inputs.ssh-host }} \
          "mkdir -p ~/dumbbell"

        scp -i /tmp/ssh_key -o StrictHostKeyChecking=no \
          infra/docker-compose.staging.yml \
          ${{ inputs.ssh-user }}@${{ inputs.ssh-host }}:~/dumbbell/docker-compose.staging.yml

    - name: Write .env file for docker compose
      shell: bash
      run: |
        # Write env file using printf (handles special chars safely)
        {
          printf 'IMAGE_NAME=%s\n' '${{ inputs.image-name }}'
          printf 'IMAGE_TAG=%s\n' '${{ inputs.image-tag }}'
          printf 'STAGING_DOMAIN=%s\n' '${{ inputs.staging-domain }}'
          printf 'DB_USER=%s\n' '${{ inputs.db-user }}'
          printf 'DB_PASSWORD=%s\n' '${{ inputs.db-password }}'
          printf 'REDIS_PASSWORD=%s\n' '${{ inputs.redis-password }}'
          printf 'JWT_SECRET=%s\n' '${{ inputs.jwt-secret }}'
          printf 'SWAGGER_USERNAME=%s\n' '${{ inputs.swagger-username }}'
          printf 'SWAGGER_PASSWORD=%s\n' '${{ inputs.swagger-password }}'
        } > /tmp/staging.env

        scp -i /tmp/ssh_key -o StrictHostKeyChecking=no \
          /tmp/staging.env \
          ${{ inputs.ssh-user }}@${{ inputs.ssh-host }}:~/dumbbell/staging.env

    - name: Deploy staging
      shell: bash
      run: |
        ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no \
          ${{ inputs.ssh-user }}@${{ inputs.ssh-host }} \
          'set -euo pipefail && cd ~/dumbbell && \
           echo "${{ inputs.registry-password }}" | docker login ghcr.io -u "${{ inputs.registry-username }}" --password-stdin && \
           docker compose --env-file staging.env -f docker-compose.staging.yml pull backend-staging && \
           docker exec mariadb-dumbbell mariadb -u root -p"${{ inputs.db-root-password }}" -e "CREATE DATABASE IF NOT EXISTS dumbbell_staging; GRANT ALL ON dumbbell_staging.* TO '"'"'${{ inputs.db-user }}'"'"'@'"'"'%'"'"';" 2>/dev/null || true && \
           docker compose --env-file staging.env -f docker-compose.staging.yml up -d --force-recreate backend-staging'

    - name: Health check staging
      shell: bash
      run: |
        for i in $(seq 1 18); do
          STATUS=$(ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no \
            ${{ inputs.ssh-user }}@${{ inputs.ssh-host }} \
            "docker inspect --format='{{.State.Health.Status}}' dumbbell-backend-staging 2>/dev/null || echo starting")
          echo "  attempt $i/18: $STATUS"
          if [ "$STATUS" = "healthy" ]; then echo "Staging deploy complete"; exit 0; fi
          if [ "$STATUS" = "unhealthy" ]; then echo "FAILED"; exit 1; fi
          sleep 5
        done
        echo "Timed out"
        exit 1

    - name: Cleanup
      if: always()
      shell: bash
      run: |
        ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no \
          ${{ inputs.ssh-user }}@${{ inputs.ssh-host }} \
          "rm -f ~/dumbbell/staging.env" 2>/dev/null || true
        rm -f /tmp/ssh_key /tmp/staging.env
