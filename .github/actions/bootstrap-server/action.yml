name: Bootstrap Server
description: SSHes into the server and starts MariaDB and Redis via docker-compose

inputs:
  ssh-host:
    description: Server hostname or IP
    required: true
  ssh-user:
    description: SSH user
    required: true
  ssh-private-key:
    description: SSH private key
    required: true
  db-root-password:
    description: MariaDB root password
    required: true
  db-user:
    description: MariaDB application user
    required: true
  db-password:
    description: MariaDB application user password
    required: true
  db-name:
    description: MariaDB database name
    required: false
    default: dumbbell
  redis-password:
    description: Redis password
    required: true

runs:
  using: composite
  steps:
    - name: Copy files to server
      shell: bash
      run: |
        echo "${{ inputs.ssh-private-key }}" > /tmp/ssh_key
        chmod 600 /tmp/ssh_key
        ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no \
          ${{ inputs.ssh-user }}@${{ inputs.ssh-host }} \
          "mkdir -p ~/dumbbell/nginx"
        scp -i /tmp/ssh_key -o StrictHostKeyChecking=no \
          apps/backend/docker-compose.yml \
          ${{ inputs.ssh-user }}@${{ inputs.ssh-host }}:~/dumbbell/docker-compose.yml
        scp -i /tmp/ssh_key -o StrictHostKeyChecking=no \
          apps/backend/nginx/nginx.conf \
          ${{ inputs.ssh-user }}@${{ inputs.ssh-host }}:~/dumbbell/nginx/nginx.conf

    - name: Create network and start infrastructure
      shell: bash
      run: |
        ssh -i /tmp/ssh_key \
          -o StrictHostKeyChecking=no \
          ${{ inputs.ssh-user }}@${{ inputs.ssh-host }} \
          "docker network create dumbbell-net 2>/dev/null || true && \
           cd ~/dumbbell && \
           if [ ! -f nginx/upstream.conf ]; then
             echo 'upstream dumbbell_backend { server 127.0.0.1:9999; }' > nginx/upstream.conf
           fi && \
           export DB_ROOT_PASSWORD='${{ inputs.db-root-password }}' && \
           export DB_USER='${{ inputs.db-user }}' && \
           export DB_PASSWORD='${{ inputs.db-password }}' && \
           export DB_NAME='${{ inputs.db-name }}' && \
           export REDIS_PASSWORD='${{ inputs.redis-password }}' && \
           docker compose up -d --wait"
        rm -f /tmp/ssh_key
