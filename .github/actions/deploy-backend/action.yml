name: Deploy Backend
description: Blue/green deploy via SSH — pulls new image, starts inactive slot, health checks it, swaps nginx, stops old slot

inputs:
  ssh-host:
    description: Server hostname or IP
    required: true
  ssh-user:
    description: SSH user
    required: true
  ssh-private-key:
    description: SSH private key
    required: true
  image-name:
    description: Full image name including registry (e.g. ghcr.io/pumpedfitness/dumbbell-backend)
    required: true
  image-tag:
    description: Image tag to deploy
    required: false
    default: latest
  registry-username:
    description: GHCR username
    required: true
  registry-password:
    description: GHCR password (GITHUB_TOKEN)
    required: true
  db-user:
    description: MariaDB application user
    required: true
  db-password:
    description: MariaDB application user password
    required: true
  db-name:
    description: MariaDB database name
    required: false
    default: dumbbell
  redis-password:
    description: Redis password
    required: true
  jwt-secret:
    description: JWT signing secret
    required: true
  swagger-username:
    description: Swagger UI username
    required: true
  swagger-password:
    description: Swagger UI password
    required: true

runs:
  using: composite
  steps:
    - name: Copy files to server
      shell: bash
      run: |
        echo "${{ inputs.ssh-private-key }}" > /tmp/ssh_key
        chmod 600 /tmp/ssh_key
        ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no \
          ${{ inputs.ssh-user }}@${{ inputs.ssh-host }} \
          "mkdir -p ~/dumbbell/nginx"
        scp -i /tmp/ssh_key -o StrictHostKeyChecking=no \
          apps/backend/docker-compose.prod.yml \
          ${{ inputs.ssh-user }}@${{ inputs.ssh-host }}:~/dumbbell/docker-compose.prod.yml
        scp -i /tmp/ssh_key -o StrictHostKeyChecking=no \
          apps/backend/nginx/nginx.conf \
          ${{ inputs.ssh-user }}@${{ inputs.ssh-host }}:~/dumbbell/nginx/nginx.conf
        scp -i /tmp/ssh_key -o StrictHostKeyChecking=no \
          .github/scripts/blue-green-deploy.sh \
          ${{ inputs.ssh-user }}@${{ inputs.ssh-host }}:~/dumbbell/blue-green-deploy.sh

    - name: Blue/green deploy
      shell: bash
      env:
        IMAGE_NAME: ${{ inputs.image-name }}
        IMAGE_TAG: ${{ inputs.image-tag }}
        REGISTRY_USERNAME: ${{ inputs.registry-username }}
        REGISTRY_PASSWORD: ${{ inputs.registry-password }}
        DB_USER: ${{ inputs.db-user }}
        DB_PASSWORD: ${{ inputs.db-password }}
        DB_NAME: ${{ inputs.db-name }}
        REDIS_PASSWORD: ${{ inputs.redis-password }}
        JWT_SECRET: ${{ inputs.jwt-secret }}
        SWAGGER_USERNAME: ${{ inputs.swagger-username }}
        SWAGGER_PASSWORD: ${{ inputs.swagger-password }}
      run: |
        printenv | grep -E '^(IMAGE_NAME|IMAGE_TAG|REGISTRY_USERNAME|REGISTRY_PASSWORD|DB_USER|DB_PASSWORD|DB_NAME|REDIS_PASSWORD|JWT_SECRET|SWAGGER_USERNAME|SWAGGER_PASSWORD)=' > /tmp/deploy.env

        scp -i /tmp/ssh_key -o StrictHostKeyChecking=no \
          /tmp/deploy.env \
          ${{ inputs.ssh-user }}@${{ inputs.ssh-host }}:~/dumbbell/deploy.env

        ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no \
          ${{ inputs.ssh-user }}@${{ inputs.ssh-host }} \
          'set -a && source ~/dumbbell/deploy.env && set +a && bash ~/dumbbell/blue-green-deploy.sh; rm -f ~/dumbbell/deploy.env'

        rm -f /tmp/ssh_key /tmp/deploy.env
