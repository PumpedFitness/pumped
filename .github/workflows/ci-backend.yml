name: CI Backend

on:
  push:
    branches: [main]
    paths: [apps/backend/**]
  pull_request:
    branches: [main]
    paths: [apps/backend/**]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Backend
        uses: ./.github/actions/setup-backend

      - name: Build & Test
        run: ./apps/backend/gradlew -p apps/backend build --no-daemon --console=plain

  publish:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Backend
        uses: ./.github/actions/setup-backend

      - name: Publish image to GHCR
        uses: ./.github/actions/publish-backend
        with:
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ghcr.io/${{ github.repository }}/dumbbell-backend
