name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bootstrap:
        description: Bootstrap MariaDB and Redis on the server (run once)
        type: boolean
        default: false
      force_backend:
        description: Force backend deployment (ignore change detection)
        type: boolean
        default: false
      force_frontend:
        description: Force frontend build (ignore change detection)
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  # ─── Change Detection ─────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
      frontend: ${{ steps.detect.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes since last deploy
        id: detect
        run: |
          BACKEND=false
          FRONTEND=false

          # Apply force flags from manual dispatch
          if [ "${{ inputs.force_backend }}" = "true" ]; then
            BACKEND=true
          fi
          if [ "${{ inputs.force_frontend }}" = "true" ]; then
            FRONTEND=true
          fi

          # Auto-detect from git diff (unless already forced)
          if [ "$BACKEND" = "false" ] || [ "$FRONTEND" = "false" ]; then
            LAST_TAG=$(git tag -l 'deploy-*' --sort=-version:refname | head -1)
            if [ -n "$LAST_TAG" ]; then
              BASE=$LAST_TAG
            else
              BASE=HEAD~1
            fi
            echo "Comparing against: $BASE"

            if [ "$BACKEND" = "false" ] && git diff --name-only "$BASE" HEAD | grep -q '^apps/backend/'; then
              BACKEND=true
            fi
            if [ "$FRONTEND" = "false" ] && git diff --name-only "$BASE" HEAD | grep -q '^apps/frontend/'; then
              FRONTEND=true
            fi
          fi

          echo "backend=$BACKEND" >> $GITHUB_OUTPUT
          echo "frontend=$FRONTEND" >> $GITHUB_OUTPUT
          echo "Backend: $BACKEND, Frontend: $FRONTEND"

  # ─── Lint & Format ────────────────────────────────────────────────────────────
  lint-backend:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Backend
        uses: ./.github/actions/setup-backend

      - name: Build & Test
        run: ./apps/backend/gradlew -p apps/backend build --no-daemon --console=plain

  lint-frontend:
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Frontend
        uses: ./.github/actions/setup-frontend

      - name: Lint
        run: bun run --cwd apps/frontend lint

      - name: Check formatting
        run: bun run --cwd apps/frontend format:check

  # ─── Publish Backend Image ────────────────────────────────────────────────────
  publish:
    needs: [changes, lint-backend]
    if: |
      always() &&
      needs.changes.outputs.backend == 'true' &&
      needs.lint-backend.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      image-name: ${{ steps.image.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Backend
        uses: ./.github/actions/setup-backend

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/dumbbell-backend" >> $GITHUB_OUTPUT

      - name: Publish image to GHCR
        uses: ./.github/actions/publish-backend
        with:
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ steps.image.outputs.name }}

  # ─── Deploy to Staging ────────────────────────────────────────────────────────
  deploy-staging:
    needs: [changes, publish]
    if: |
      always() &&
      needs.changes.outputs.backend == 'true' &&
      needs.publish.result == 'success'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to staging
        uses: ./.github/actions/deploy-staging
        with:
          ssh-host: ${{ secrets.SSH_HOST }}
          ssh-user: ${{ secrets.SSH_USER }}
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          image-name: ${{ needs.publish.outputs.image-name }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          db-root-password: ${{ secrets.DB_ROOT_PASSWORD }}
          db-user: ${{ secrets.DB_USER }}
          db-password: ${{ secrets.DB_PASSWORD }}
          redis-password: ${{ secrets.REDIS_PASSWORD }}
          jwt-secret: ${{ secrets.JWT_SECRET }}
          swagger-username: ${{ secrets.SWAGGER_USERNAME }}
          swagger-password: ${{ secrets.SWAGGER_PASSWORD }}

  # ─── Build Frontend (against staging API) ─────────────────────────────────────
  build-frontend:
    needs: [changes, deploy-staging, lint-frontend]
    if: |
      always() &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true') &&
      (needs.deploy-staging.result == 'success' || needs.deploy-staging.result == 'skipped') &&
      (needs.lint-frontend.result == 'success' || needs.lint-frontend.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend against staging
        uses: ./.github/actions/build-frontend
        with:
          staging-host: ${{ secrets.SSH_HOST }}
          swagger-username: ${{ secrets.SWAGGER_USERNAME }}
          swagger-password: ${{ secrets.SWAGGER_PASSWORD }}

  # ─── Deploy Production ────────────────────────────────────────────────────────
  deploy-production:
    needs: [changes, publish, build-frontend, deploy-staging]
    if: |
      always() &&
      needs.changes.outputs.backend == 'true' &&
      needs.publish.result == 'success' &&
      needs.deploy-staging.result == 'success' &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy backend to production
        uses: ./.github/actions/deploy-backend
        with:
          ssh-host: ${{ secrets.SSH_HOST }}
          ssh-user: ${{ secrets.SSH_USER }}
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          image-name: ${{ needs.publish.outputs.image-name }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          db-user: ${{ secrets.DB_USER }}
          db-password: ${{ secrets.DB_PASSWORD }}
          redis-password: ${{ secrets.REDIS_PASSWORD }}
          jwt-secret: ${{ secrets.JWT_SECRET }}
          swagger-username: ${{ secrets.SWAGGER_USERNAME }}
          swagger-password: ${{ secrets.SWAGGER_PASSWORD }}

      - name: Tag deployment
        run: |
          git tag "deploy-$(date +%Y%m%d-%H%M%S)"
          git push origin --tags

  # ─── Bootstrap (manual only) ──────────────────────────────────────────────────
  bootstrap:
    if: github.event_name == 'workflow_dispatch' && inputs.bootstrap == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap server databases
        uses: ./.github/actions/bootstrap-server
        with:
          ssh-host: ${{ secrets.SSH_HOST }}
          ssh-user: ${{ secrets.SSH_USER }}
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          db-root-password: ${{ secrets.DB_ROOT_PASSWORD }}
          db-user: ${{ secrets.DB_USER }}
          db-password: ${{ secrets.DB_PASSWORD }}
          redis-password: ${{ secrets.REDIS_PASSWORD }}
