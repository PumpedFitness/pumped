services:
  backend-staging:
    image: ${IMAGE_NAME}:${IMAGE_TAG:-latest}
    container_name: dumbbell-backend-staging
    restart: unless-stopped
    labels:
      traefik.enable: "true"
      traefik.http.routers.backend-staging.rule: "Host(`${STAGING_DOMAIN}`)"
      traefik.http.routers.backend-staging.entrypoints: "web"
      traefik.http.services.backend-staging.loadbalancer.server.port: "8080"
    environment:
      SPRING_PROFILES_ACTIVE: production
      DB_HOST: mariadb-dumbbell
      DB_PORT: 3306
      DB_NAME: dumbbell_staging
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis-dumbbell
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 86400000
      SWAGGER_USERNAME: ${SWAGGER_USERNAME}
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD}
    networks:
      - dumbbell-net
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

networks:
  dumbbell-net:
    external: true
    name: dumbbell-net
